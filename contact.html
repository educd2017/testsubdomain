<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا | My Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">MySite</div>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="about.html">عن الموقع</a></li>
            <li><a href="contact.html" class="active">اتصل بنا</a></li>
        </ul>
    </nav>

    <section class="content contact">
        <h1>اتصل بنا</h1>
        <p>نحن سعداء بتواصلك معنا!</p>

        <form id="contactForm">
            <input type="text" id="name" placeholder="الاسم" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <textarea id="message" rows="6" placeholder="رسالتك..." required></textarea>
            <button type="submit" class="btn">إرسال الرسالة</button>
        </form>

        <div id="successMessage" class="success hidden">
            تم إرسال رسالتك بنجاح! سنتواصل معك قريبًا.
        </div>
    </section>

    <footer>
        <p>&copy; 2026 MySite - جميع الحقوق محفوظة</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
